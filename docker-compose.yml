services:
  app:
    build: .
    container_name: bothsv
    restart: unless-stopped
    # init reapea los procesos hijos de Chromium (zombies de Puppeteer)
    init: true
    env_file: .env
    environment:
      DB_PATH: /data/jugueteria.db
      CHROME_PATH: /usr/bin/chromium
      DASHBOARD_HOST: 0.0.0.0            # dentro del contenedor; expuesto solo a 127.0.0.1 del host
      DASHBOARD_COOKIE_SECURE: "true"    # el dashboard va detrás de un proxy con TLS
      TRUST_PROXY: "1"                   # detrás de un reverse proxy o túnel (esta instancia usa
                                         # Cloudflare Tunnel, ver REANUDAR-DESARROLLO.md; Caddy/nginx
                                         # también valen): la IP real viene en X-Forwarded-For
                                         # (sin proxy/túnel delante, pon 0 o el rate-limit es engañable)
      # SQLite usa datetime('now','localtime') en cortes/reportes/campañas:
      # sin TZ el contenedor corre en UTC y las fechas se recorren
      TZ: America/Monterrey
      # CRÍTICO: la llave que descifra los secretos enc: (clave de correo, PAC,
      # pasarela) y firma las sesiones debe vivir en el VOLUMEN — dentro de la
      # imagen se pierde en cada redeploy y nada guardado vuelve a descifrar.
      INSTANCIA_SECRET_PATH: /data/.instancia_secret
      # Registro de respaldos (imágenes ya enviadas + fecha del último backup
      # OK que vigila la alerta de 36h) — mismo motivo.
      BACKUP_REGISTRO_PATH: /data/.backup_registro.json
      # El .env que migras de Windows trae rutas C:\ en estas — aquí se
      # neutralizan (Vision degrada apagado, no truena). Para activar Vision en
      # el servidor: copia el JSON a ./data/ y apunta la ruta del contenedor:
      GOOGLE_APPLICATION_CREDENTIALS: ""
      # GOOGLE_APPLICATION_CREDENTIALS: /data/google-vision.json
      LOG_FILE: ""                       # default del contenedor: bot/logs/bot.log (volumen)
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Solo localhost: el dashboard se expone a internet únicamente a través
    # del reverse proxy con TLS (Caddy/nginx), nunca directo.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/data                                  # jugueteria.db + .instancia_secret + registro de respaldos
      - ./instancias:/app/instancias                   # BDs de instancias extra (multi-tienda; migrate --all las migra)
      - wwebjs_auth:/app/.wwebjs_auth                  # sesión de WhatsApp
      - ./imagenes_clientes:/app/bot/imagenes_clientes # fotos de clientes
      - ./imagenes_productos:/app/bot/imagenes_productos # fotos de producto (WebP + transporte)
      - ./logs:/app/logs                               # logs de pm2
      - ./logs-bot:/app/bot/logs                       # logs del logger del bot
    # Si el Caddy del servidor corre COMO CONTENEDOR (no en el host),
    # descomenta esta red y en el Caddyfile usa `reverse_proxy bothsv:3001`;
    # con Caddy instalado en el host, el mapeo 127.0.0.1:3001 de arriba basta.
    # networks: [proxy]

# networks:
#   proxy:
#     external: true   # la red donde ya vive el contenedor de Caddy

volumes:
  wwebjs_auth:
